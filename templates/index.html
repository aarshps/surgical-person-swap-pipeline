<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Odiyan</title>
    <style>
        :root {
            --bg: #000;
            --surface: #0a0a0a;
            --accent: #38bdf8;
            --text: #fff;
            --text-dim: #555;
            --success: #10b981;
            --danger: #ef4444;
            /* High-end easing function */
            --bezier: cubic-bezier(0.65, 0, 0.35, 1);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            line-height: 1.4;
            display: flex;
            justify-content: center;
            transition: background 1s var(--bezier);
        }

        .container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 1.2s var(--bezier);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 0.8rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 0.3em;
            color: var(--text-dim);
            transition: color 0.5s var(--bezier);
        }

        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #111;
            transition: border-color 0.5s var(--bezier);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: color 0.3s var(--bezier);
        }

        .stat-value {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            transition: transform 0.5s var(--bezier);
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 12px;
            transition: all 0.5s var(--bezier);
        }

        .status-running { background: var(--success); box-shadow: 0 0 15px var(--success); }
        .status-stopped { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        #task-container {
            margin-top: 4rem;
            padding: 1.5rem;
            background: var(--surface);
            border-radius: 4px;
            border: 1px solid #111;
            transition: all 0.8s var(--bezier);
        }

        #task-bar-bg {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            margin: 1.5rem 0;
            overflow: hidden;
        }

        #task-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            transition: width 1.2s var(--bezier);
        }

        .btn-reset {
            margin-top: 2rem;
            background: none;
            border: 1px solid #222;
            color: var(--text-dim);
            font-size: 0.65rem;
            padding: 0.6rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
            transition: all 0.4s var(--bezier);
        }

        .btn-reset:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.05);
            transform: scale(0.98);
        }

        .btn-reset:active { transform: scale(0.95); }

        #last-update { font-size: 0.65rem; color: #333; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ODIYAN</h1>
            <div id="last-update">--:--:--</div>
        </div>

        <div class="stats-list" style="margin-bottom: 2rem;">
            <div class="stat-item">
                <span class="stat-label">Pending</span>
                <span id="pending-count" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">In Progress</span>
                <span id="progress-count" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed</span>
                <span id="completed-count" class="stat-value">0</span>
            </div>
        </div>

        <div id="task-container" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div id="task-phase" class="stat-label" style="color: var(--accent); margin-bottom: 0.2rem;">...</div>
                    <div id="task-details" style="font-size: 0.65rem; color: var(--text-dim);">...</div>
                </div>
                <div style="text-align: right;">
                    <div id="task-percent" style="font-size: 0.8rem; font-weight: 700;">0%</div>
                    <div id="task-timer" style="font-size: 0.6rem; color: var(--accent); margin-top: 2px; font-family: monospace;">00:00</div>
                    <div id="task-eta" style="font-size: 0.55rem; color: var(--text-dim); margin-top: 2px;">QUEUE ETA: --:--</div>
                </div>
            </div>
            <div id="task-bar-bg">
                <div id="task-bar"></div>
            </div>
        </div>
    </div>

    <script>
        let startTime = null;
        let lastTaskTimestamp = 0;
        let estimatedDuration = 0;
        let timerInterval = null;

        function startTimer(serverTimestamp, duration) {
            if (timerInterval) clearInterval(timerInterval);
            estimatedDuration = duration;
            
            timerInterval = setInterval(() => {
                const now = Date.now() / 1000;
                const elapsed = now - serverTimestamp;
                const remaining = Math.max(0, duration - elapsed);
                
                const mins = Math.floor(remaining / 60);
                const secs = Math.floor(remaining % 60);
                document.getElementById('task-timer').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')} LEFT`;

                // Smoothly update progress bar virtually
                const virtualProgress = Math.min(99, (elapsed / duration) * 100);
                const currentRealProgress = parseInt(document.getElementById('task-percent').innerText);
                if (virtualProgress > currentRealProgress) {
                    document.getElementById('task-bar').style.width = virtualProgress + '%';
                    document.getElementById('task-percent').innerText = Math.floor(virtualProgress) + '%';
                }
            }, 1000);
        }

        async function update() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();

                // Update Counts
                document.getElementById('pending-count').innerText = d.counts.pending;
                document.getElementById('progress-count').innerText = d.counts.in_progress;
                document.getElementById('completed-count').innerText = d.counts.completed;

                // Task Logic
                const task = d.task;
                const container = document.getElementById('task-container');
                
                if (d.counts.in_progress > 0 && task.phase !== 'IDLE') {
                    container.style.display = 'block';
                    document.getElementById('task-phase').innerText = task.phase;
                    document.getElementById('task-details').innerText = task.details;
                    document.getElementById('task-eta').innerText = 'QUEUE ETA: ' + d.eta;
                    
                    if (task.timestamp !== lastTaskTimestamp) {
                        lastTaskTimestamp = task.timestamp;
                        document.getElementById('task-percent').innerText = task.progress + '%';
                        document.getElementById('task-bar').style.width = task.progress + '%';
                        startTimer(task.timestamp, task.estimated_duration);
                    }
                } else {
                    container.style.display = 'none';
                    if (timerInterval) clearInterval(timerInterval);
                }

                document.getElementById('last-update').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});
            } catch (e) {
                console.error(e);
            }
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
